services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      SQLITE_PATH: /app/data/salon.db
    volumes:
      - salon_data:/app/data
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  salon_data:
